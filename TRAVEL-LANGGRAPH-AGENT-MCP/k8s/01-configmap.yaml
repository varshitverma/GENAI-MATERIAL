apiVersion: v1
kind: ConfigMap
metadata:
  name: travel-mcp-config
  namespace: travel-mcp
  labels:
    app.kubernetes.io/name: travel-mcp-config
    app.kubernetes.io/part-of: travel-langgraph-agent-mcp
data:
  LLM_MODEL: "gpt-4o"
  CHECKPOINTER_TYPE: "postgres"
  LANGGRAPH_POSTGRES_SETUP: "false"
  LANGGRAPH_POSTGRES_POOL_MODE: "null"
  LANGGRAPH_POSTGRES_POOL_MIN_SIZE: "1"
  LANGGRAPH_POSTGRES_POOL_MAX_SIZE: "10"
  LANGGRAPH_POSTGRES_POOL_MAX_IDLE: "500"
  LANGGRAPH_POSTGRES_POOL_MAX_LIFETIME: "300"
  LANGGRAPH_POSTGRES_POOL_TIMEOUT: "30"
  BOOKINGS_TABLE_ENABLED: "true"
  BOOKINGS_TABLE_SETUP: "true"
  BOOKINGS_TABLE_NAME: "bookings"
  TRAVEL_AGENT_API_URL: "http://travel-langgraph-agent:8000/chat"
